<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Devanshi Bhardwaj | Process Engineer & Materials Scientist</title>
    <style>
        :root {
            --bg-color: #F7FAFC;
            --card-bg: #ffffff;
            --text-color: #2D3748;
            --heading-color: #1A202C;
            --accent-color: #2B6CB0;
            --border-color: #E2E8F0;
        }
        [data-theme="dark"] {
            --bg-color: #1A202C;
            --card-bg: #2D3748;
            --text-color: #E2E8F0;
            --heading-color: #F7FAFC;
            --accent-color: #63B3ED;
            --border-color: #4A5568;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 950px;
            margin: 0 auto 40px auto;
            padding: 0 20px;
            color: var(--text-color);
            background-color: var(--bg-color);
            transition: background 0.3s, color 0.3s;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            margin-right: 20px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .nav-links a.active { color: var(--accent-color); }
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-color);
            font-size: 0.85rem;
        }
        header {
            padding: 40px 0;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .header-text { flex: 1; }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
        }
        h1 { color: var(--heading-color); margin: 0 0 5px 0; font-size: 2.5rem; }
        .subtitle { color: var(--text-color); font-size: 1.2rem; font-weight: 500; margin-bottom: 10px; }
        .contact-info { color: var(--text-color); opacity: 0.8; font-size: 0.95rem; margin-bottom: 15px; }
        .links-container { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-link {
            display: inline-flex;
            align-items: center;
            background: #2B6CB0;
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .btn-secondary { background: #4A5568; }
        
        h2 { color: var(--accent-color); margin-top: 30px; font-size: 1.4rem; border-left: 4px solid var(--accent-color); padding-left: 10px; }
        p { margin-bottom: 15px; text-align: justify; }
        
        /* TWO-COLUMN GRID LAYOUT */
        .content-layout {
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 30px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                order: -1;
            }
        }
        
        /* RIGHT SIDEBAR PANEL STYLING */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
        }
        .sidebar-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .sidebar-title {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            color: var(--heading-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 6px;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
        }
